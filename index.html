<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 Álbum Real de Valentina</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://widget.cloudinary.com/v2.0/global/all.js" type="text/javascript"></script>

    <style>
        :root {
            --oro: #d4af37;
            --rosa-suave: #fdf2f5;
            --texto: #5a4a42;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0; padding: 0;
            background-color: #fef1f8;
            color: var(--texto);
            text-align: center;
        }

        /* BARRA DE ADMIN OCULTA (SOLO CON LLAVE) */
        #adminBar {
            display: none; /* Se activa con el truco de los 3 clics */
            background: var(--texto);
            color: white;
            padding: 12px;
            font-size: 0.8rem;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 2000;
            border-bottom: 3px solid var(--oro);
        }

        .btn-zip {
            background: var(--oro);
            color: white;
            padding: 8px 15px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            text-transform: uppercase;
            border: 1px solid white;
        }

        /* PORTADA */
        .header-album {
            background: white;
            padding: 40px 20px;
            border-bottom: 5px double var(--oro);
        }

        .foto-portada {
            width: 160px;
            height: 160px;
            margin: 0 auto 20px;
            border-radius: 50%;
            border: 5px solid var(--oro);
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            cursor: pointer; /* Indica que se puede tocar */
        }

        .foto-portada img { width: 100%; height: 100%; object-fit: cover; }

        h1 { 
            font-family: 'Great Vibes', cursive; 
            font-size: 3.8rem; 
            color: var(--oro); 
            margin: 10px 0 0;
        }

        /* GALERÍA */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            padding: 12px;
            margin-bottom: 110px;
        }

        .photo-item {
            aspect-ratio: 1/1;
            background: #fff;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #eee;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .photo-item img { width: 100%; height: 100%; object-fit: cover; }

        /* BOTÓN SUBIR */
        .upload-area {
            position: fixed;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 1500;
        }

        .btn-magic-upload {
            background: var(--oro);
            color: white;
            border: 2px solid white;
            padding: 18px 35px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.6);
            cursor: pointer;
            transition: 0.3s;
        }

        #status-msg { padding: 40px; font-style: italic; color: #999; }
    </style>
</head>
<body>

    <div id="adminBar">
        <span>👑 PANEL ANFITRIONA</span>
        <button class="btn-zip" onclick="descargarTodo()">DESCARGAR TODO (.ZIP)</button>
    </div>

    <div class="header-album">
        <div class="foto-portada" onclick="trucoSecreto()">
            <img src="https://www.dropbox.com/scl/fi/nm44i882g13044o8idz6k/xv1.jpg?rlkey=wn8xf4ne3yp5fz4vkzpsvbz4p&raw=1" alt="Valentina">
        </div>
        <p style="text-transform: uppercase; letter-spacing: 3px; font-size: 0.7rem;">Libro de Recuerdos de</p>
        <h1>Valentina</h1>
    </div>

    <div id="status-msg">Cargando fotos reales...</div>
    <div class="gallery-grid" id="galleryContainer"></div>

    <div class="upload-area">
        <button id="upload_widget" class="btn-magic-upload">📸 SUBIR FOTO</button>
    </div>

    <script>
        const cloudName = "dkoaxjahe"; 
        const uploadPreset = "ALBUN TEST"; 
        const eventTag = "cumple_valentina_6";

        let contadorClics = 0;

        // 1. EL TRUCO DE LA LLAVE
        function trucoSecreto() {
            contadorClics++;
            if (contadorClics === 3) {
                const pass = prompt("Ingrese la Llave Real (Contraseña):");
                if (pass === "1234") { // <--- AQUÍ PUEDES CAMBIAR LA CLAVE
                    document.getElementById('adminBar').style.display = 'flex';
                    alert("¡Acceso concedido! Botón de descarga activado arriba.");
                } else {
                    alert("Llave incorrecta.");
                    contadorClics = 0;
                }
            }
        }

        // 2. CARGAR FOTOS (PERSISTENCIA)
        async function cargarGaleria() {
            const grid = document.getElementById('galleryContainer');
            const msg = document.getElementById('status-msg');
            
            // IMPORTANTE: Recuerda desactivar "Resource List" en la seguridad de Cloudinary
            const url = `https://res.cloudinary.com/${cloudName}/image/list/${eventTag}.json`;

            try {
                const response = await fetch(url + "?t=" + new Date().getTime());
                const data = await response.json();
                
                if (data.resources && data.resources.length > 0) {
                    msg.style.display = 'none';
                    grid.innerHTML = ''; 
                    data.resources.forEach(img => {
                        const item = document.createElement('div');
                        item.className = 'photo-item';
                        const imgSrc = `https://res.cloudinary.com/${cloudName}/image/upload/w_400,c_fill,g_auto/${img.public_id}.${img.format}`;
                        item.innerHTML = `<img src="${imgSrc}" onclick="window.open('https://res.cloudinary.com/${cloudName}/image/upload/${img.public_id}.${img.format}')">`;
                        grid.appendChild(item);
                    });
                } else {
                    msg.innerText = "¡Sé el primero en subir una foto!";
                }
            } catch (e) {
                msg.innerText = "¡Toca el botón para subir fotos!";
            }
        }

        // 3. WIDGET DE SUBIDA
        const myWidget = cloudinary.createUploadWidget({
            cloudName: cloudName, 
            uploadPreset: uploadPreset,
            sources: ['local', 'camera'],
            tags: [eventTag],
            clientAllowedFormats: ["png", "jpg", "jpeg"],
            theme: "minimal",
            styles: { palette: { window: "#FFFFFF", windowBorder: "#D4AF37", tabIcon: "#D4AF37", action: "#FF007F", link: "#D4AF37", textDark: "#5A4A42", textLight: "#FFFFFF" } }
        }, (error, result) => { 
            if (!error && result && result.event === "success") { 
                setTimeout(cargarGaleria, 1500); // Recarga después de subir
            }
        });

        document.getElementById("upload_widget").addEventListener("click", () => myWidget.open(), false);

        // 4. DESCARGA ZIP REAL
        function descargarTodo() {
            const zipUrl = `https://res.cloudinary.com/${cloudName}/image/generate_archive?tag=${eventTag}`;
            window.location.href = zipUrl;
        }

        window.onload = cargarGaleria;
    </script>
</body>
</html>
